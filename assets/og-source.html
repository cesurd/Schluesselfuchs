<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Sora',sans-serif;
  background:linear-gradient(150deg,#26262B 0%,#1A1A1F 100%);position:relative;color:#fff}
.glow{position:absolute;top:-260px;right:-160px;width:760px;height:760px;border-radius:50%;
  background:radial-gradient(circle,rgba(241,90,0,.5),transparent 62%);filter:blur(8px)}
.glow2{position:absolute;bottom:-300px;left:-200px;width:640px;height:640px;border-radius:50%;
  background:radial-gradient(circle,rgba(241,90,0,.18),transparent 60%)}
.wrap{position:relative;z-index:1;display:flex;align-items:center;gap:70px;height:100%;padding:0 90px}
.logo{width:230px;height:230px;flex-shrink:0;filter:drop-shadow(0 18px 44px rgba(241,90,0,.45))}
.eyebrow{display:inline-block;background:rgba(241,90,0,.16);border:1.5px solid rgba(241,90,0,.5);
  color:#FF9142;font-size:21px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:10px 22px;border-radius:100px;margin-bottom:28px}
h1{font-size:64px;font-weight:800;line-height:1.06;letter-spacing:-.02em}
h1 span{color:#FF6B1A}
.sub{font-family:'Inter',sans-serif;font-size:27px;color:#C7C7D0;margin-top:26px;font-weight:500}
.sub b{color:#fff}
.phone{display:inline-flex;align-items:center;gap:14px;margin-top:34px;background:#F15A00;
  border-radius:100px;padding:18px 34px;font-size:30px;font-weight:700;box-shadow:0 18px 40px -10px rgba(241,90,0,.55)}
</style>
</head>
<body>
<div class="glow"></div><div class="glow2"></div>
<div class="wrap">
  <img class="logo" src="logo-mark.svg" alt="">
  <div>
    <span class="eyebrow">24/7 Notdienst · Ruhrgebiet &amp; Rheinland</span>
    <h1>Ausgesperrt?<br>Der <span>Fuchs</span> kommt.</h1>
    <p class="sub">Türöffnung ab <b>69&nbsp;€</b> · in <b>20–45 Min.</b> vor Ort · Preis vorab am Telefon</p>
    <span class="phone">☎ 0157 9245 0026</span>
  </div>
</div>
</body>
</html>
