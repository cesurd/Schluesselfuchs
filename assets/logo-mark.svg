<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Schlüsselfuchs – Fuchs mit Schlüssel Logo">
  <defs>
    <clipPath id="sfBadge"><rect x="4" y="4" width="112" height="112" rx="24"/></clipPath>
    <linearGradient id="sfOrange" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#EF6E1C"/><stop offset="1" stop-color="#E85B0E"/>
    </linearGradient>
    <linearGradient id="sfDark" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#37373E"/><stop offset="1" stop-color="#28282E"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#sfBadge)">
    <!-- two-tone badge -->
    <rect x="4" y="4" width="56" height="112" fill="url(#sfOrange)"/>
    <rect x="60" y="4" width="56" height="112" fill="url(#sfDark)"/>
    <!-- flat low-poly facets -->
    <polygon points="4,4 60,4 60,50 4,70" fill="#F5792A" opacity="0.6"/>
    <polygon points="4,116 60,116 60,74 4,92" fill="#000000" opacity="0.08"/>
    <polygon points="60,4 116,4 116,52 60,44" fill="#ffffff" opacity="0.04"/>
    <polygon points="116,116 60,116 60,64 116,54" fill="#000000" opacity="0.12"/>
    <polygon points="60,58 95,70 86,116 44,116" fill="#000000" opacity="0.05"/>

    <!-- fox: orange face + even white outline -->
    <path d="M24 11 L42 21 L60 25 L78 21 L96 11 L94 45 L72 55 L64 67 L60 70 L56 67 L48 55 L26 45 Z" fill="url(#sfOrange)"/>
    <path d="M30 19 L40 25 L32 29 Z" fill="#2A2A2E"/>
    <path d="M90 19 L80 25 L88 29 Z" fill="#2A2A2E"/>
    <path d="M24 11 L42 21 L60 25 L78 21 L96 11 L94 45 L72 55 L64 67 L60 70 L56 67 L48 55 L26 45 Z" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="miter" stroke-miterlimit="8"/>
    <!-- eyes -->
    <path d="M44 45 L54 47.5 L53 50 L44 47.5 Z" fill="#FFFFFF"/>
    <path d="M76 45 L66 47.5 L67 50 L76 47.5 Z" fill="#FFFFFF"/>
    <!-- key: bow merges into muzzle, slim shaft, groove, 4 filed teeth (angled flanks), pointed tip -->
    <path d="M55.5 73 L56 67.5 Q60 66.3 64 67.5 L64.5 73 L65 74 L68.5 75.8 L68.5 79 L65 80.5 L65 84.5 L68.5 86 L68.5 88 L65 89.5 L65 92.5 L68.3 94 L68.3 96 L65 97.5 L65 100 L68.7 101.5 L68.7 104 L65 108.8 L60 112 L55.5 105 Z" fill="#FFFFFF"/>
    <rect x="58.7" y="70" width="1.5" height="32" rx="0.7" fill="#C4C4CA" opacity="0.6"/>
    <!-- nose -->
    <path d="M56 61 L64 61 L60 65.5 Z" fill="#2A2A2E"/>
    <!-- inner border -->
    <rect x="5.5" y="5.5" width="109" height="109" rx="22" fill="none" stroke="#FBEFE3" stroke-width="1.4" opacity="0.38"/>
  </g>
</svg>
