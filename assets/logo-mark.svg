<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fuchs Schlüsseldienst Logo">
  <defs>
    <clipPath id="badge"><rect x="4" y="4" width="112" height="112" rx="26"/></clipPath>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7A1A"/><stop offset="1" stop-color="#F15A00"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35353C"/><stop offset="1" stop-color="#1F1F24"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#badge)">
    <!-- two-tone badge -->
    <rect x="0" y="0" width="61" height="120" fill="url(#orange)"/>
    <rect x="59" y="0" width="61" height="120" fill="url(#dark)"/>
    <polygon points="0,0 61,0 0,64" fill="#ffffff" opacity="0.10"/>
    <polygon points="120,120 59,120 120,52" fill="#000000" opacity="0.18"/>

    <!-- fox -->
    <g>
      <!-- ears (white, with dark inner) -->
      <path d="M31 11 L54 26 L41 41 Q33 30 31 11 Z" fill="#FFFFFF"/>
      <path d="M89 11 L66 26 L79 41 Q87 30 89 11 Z" fill="#FFFFFF"/>
      <path d="M36 18 L50 27 L43 35 Q38 28 36 18 Z" fill="#26262B"/>
      <path d="M84 18 L70 27 L77 35 Q82 28 84 18 Z" fill="#26262B"/>

      <!-- face: white base (trim) + orange head overlay, white snout stays free -->
      <path d="M37 29 L83 29 Q81 48 72 56 Q66 61 60 74 Q54 61 48 56 Q39 48 37 29 Z" fill="#FFFFFF"/>
      <path d="M40 31 L80 31 Q78 46 70 53 Q65 57 60 61 Q55 57 50 53 Q42 46 40 31 Z" fill="url(#orange)"/>

      <!-- eyes (friendly slants, on orange forehead) -->
      <path d="M47 40 Q52 38 56 42 Q52 46 47 44 Z" fill="#FFFFFF"/>
      <path d="M73 40 Q68 38 64 42 Q68 46 73 44 Z" fill="#FFFFFF"/>

      <!-- nose (on white snout) -->
      <path d="M55.5 62 L64.5 62 L60 68.5 Z" fill="#26262B"/>

      <!-- key: shaft from chin + bow hole + teeth -->
      <rect x="56.2" y="70" width="7.6" height="32" rx="2.4" fill="#FFFFFF"/>
      <circle cx="60" cy="76.5" r="3" fill="#26262B"/>
      <rect x="63.8" y="86" width="7.5" height="4.6" rx="1.4" fill="#FFFFFF"/>
      <rect x="63.8" y="94.5" width="5.6" height="4.6" rx="1.4" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
